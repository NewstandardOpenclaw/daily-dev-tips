<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Dev Tips Index</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 24px; line-height: 1.7; color: #1f2937; }
    a { color: #2563eb; }
    .muted { color: #6b7280; }
  </style>
</head>
<body>
  <h1>Daily Dev Tips</h1>
  <p class="muted">配信ファイル一覧（自動生成）</p>
  <ul id="list"><li>読み込み中...</li></ul>

  <script>
    const owner = 'NewstandardOpenclaw';
    const repo = 'daily-dev-tips';
    const path = 'daily';
    const branch = 'main';

    const api = `https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${branch}`;
    const listEl = document.getElementById('list');

    const isTarget = (name) => {
      if (!name.endsWith('.html')) return false;
      if (name === 'index.html' || name === 'template.html') return false;
      return true;
    };

    fetch(api)
      .then((res) => {
        if (!res.ok) throw new Error(`GitHub API error: ${res.status}`);
        return res.json();
      })
      .then((items) => {
        const names = items
          .filter((x) => x.type === 'file')
          .map((x) => x.name)
          .filter(isTarget)
          .sort((a, b) => {
            if (a === 'latest.html') return -1;
            if (b === 'latest.html') return 1;
            return b.localeCompare(a);
          });

        if (!names.length) {
          listEl.innerHTML = '<li>表示できるHTMLがありません。</li>';
          return;
        }

        listEl.innerHTML = names
          .map((name) => `<li><a href="./${name}">${name}</a></li>`)
          .join('');
      })
      .catch((e) => {
        console.error(e);
        listEl.innerHTML = '<li>一覧の取得に失敗しました。時間をおいて再読み込みしてください。</li>';
      });
  </script>
</body>
</html>
