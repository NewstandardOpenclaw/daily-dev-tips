<body>
  <h1>連絡先ダウンロード（サンプル）</h1>
  <p>下のリンクを押すと vCard（.vcf）を保存できます。</p>

  <a
    href="data:text/vcard;charset=utf-8,BEGIN%3AVCARD%0AVERSION%3A3.0%0AREV%3A2026-03-04T00%3A00%3A00Z%0AN%3A%3B%E3%83%AC%E3%83%90%E3%82%A6%E3%82%A7%E3%83%AB%E4%BB%8B%E8%AD%B7%3B%3Baaa%3B%0ATEL%3A09012345678%0AEND%3AVCARD"
    download="contact.vcf"
  >
    vCardをダウンロード
  </a>

  <hr />
  <p>内容確認用:</p>
  <pre>BEGIN:VCARD
VERSION:3.0
REV:2026-03-04T00:00:00Z
N:;レバウェル介護;;aaa;
TEL:09012345678
END:VCARD</pre>
</body>
