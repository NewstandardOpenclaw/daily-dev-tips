<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Dev Tips - Hamburger Menu Sample</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --brand: #2563eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(8px);
    }
    .menu-btn {
      border: 1px solid var(--line);
      background: #fff;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
    }
    .title {
      font-weight: 700;
      font-size: 16px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.35);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
      z-index: 30;
    }
    .overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .drawer {
      position: fixed;
      top: 0;
      left: 0;
      height: 100dvh;
      width: min(88vw, 360px);
      background: #fff;
      border-right: 1px solid var(--line);
      transform: translateX(-100%);
      transition: transform .2s ease;
      z-index: 40;
      display: flex;
      flex-direction: column;
    }
    .drawer.show { transform: translateX(0); }

    .drawer-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 14px;
      border-bottom: 1px solid var(--line);
      font-weight: 700;
    }
    .close-btn {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 8px;
      width: 34px;
      height: 34px;
      cursor: pointer;
    }

    .drawer-body {
      padding: 10px 14px 16px;
      overflow: auto;
      flex: 1;
    }
    .drawer-body a {
      display: block;
      color: var(--brand);
      text-decoration: none;
      padding: 8px 0;
      border-bottom: 1px dashed #eef2f7;
      word-break: break-all;
    }
    .drawer-body a:hover { text-decoration: underline; }
    .muted { color: var(--muted); font-size: 13px; }
  </style>
</head>
<body>
  <header class="topbar">
    <button class="menu-btn" id="openMenu" aria-label="メニューを開く">☰</button>
    <div class="title">Daily Dev Tips（ハンバーガーメニュー試作）</div>
  </header>

  <aside class="drawer" id="drawer" aria-hidden="true">
    <div class="drawer-head">
      <span>過去配信リンク</span>
      <button class="close-btn" id="closeMenu" aria-label="メニューを閉じる">✕</button>
    </div>
    <div class="drawer-body">
      <div class="muted" style="margin-bottom:8px;">最新 + 過去HTML（新しい順）</div>
      <div id="links"><span class="muted">読み込み中...</span></div>
    </div>
  </aside>
  <div class="overlay" id="overlay"></div>

  <main class="container">
    <section class="card">
      <h1 style="margin-top:0">サンプル</h1>
      <p>このページは <code>/daily/WIP/hamburger-menu-sample/</code> 用の試作です。</p>
      <ul>
        <li>左上の ☰ から過去配信リンクを表示</li>
        <li>リンク一覧は GitHub API から自動取得</li>
        <li><code>index.html</code> / <code>template.html</code> は除外</li>
      </ul>
    </section>
  </main>

  <script>
    const owner = 'NewstandardOpenclaw';
    const repo = 'daily-dev-tips';
    const path = 'daily';
    const branch = 'main';

    const api = `https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${branch}`;
    const linksEl = document.getElementById('links');

    const isTarget = (name) => {
      if (!name.endsWith('.html')) return false;
      if (name === 'index.html' || name === 'template.html') return false;
      return true;
    };

    fetch(api)
      .then((res) => {
        if (!res.ok) throw new Error(`GitHub API error: ${res.status}`);
        return res.json();
      })
      .then((items) => {
        const names = items
          .filter((x) => x.type === 'file')
          .map((x) => x.name)
          .filter(isTarget)
          .sort((a, b) => {
            if (a === 'latest.html') return -1;
            if (b === 'latest.html') return 1;
            return b.localeCompare(a);
          });

        if (!names.length) {
          linksEl.innerHTML = '<span class="muted">リンクが見つかりません。</span>';
          return;
        }

        linksEl.innerHTML = names
          .map((name) => `<a href="../../${name}" target="_blank" rel="noopener noreferrer">${name}</a>`)
          .join('');
      })
      .catch((e) => {
        console.error(e);
        linksEl.innerHTML = '<span class="muted">取得に失敗しました。再読み込みしてください。</span>';
      });

    const drawer = document.getElementById('drawer');
    const overlay = document.getElementById('overlay');
    const openMenu = document.getElementById('openMenu');
    const closeMenu = document.getElementById('closeMenu');

    const open = () => {
      drawer.classList.add('show');
      overlay.classList.add('show');
      drawer.setAttribute('aria-hidden', 'false');
    };
    const close = () => {
      drawer.classList.remove('show');
      overlay.classList.remove('show');
      drawer.setAttribute('aria-hidden', 'true');
    };

    openMenu.addEventListener('click', open);
    closeMenu.addEventListener('click', close);
    overlay.addEventListener('click', close);
    window.addEventListener('keydown', (e) => { if (e.key === 'Escape') close(); });
  </script>
</body>
</html>
